<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Snus Counter</title>
    <link rel="stylesheet" href="Style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0078ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Snus">

    <!-- Manifest -->
    <link rel="manifest" href="/Snus_app/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230078ff' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>S</text></svg>">
</head>

<body>
<header>
    <h1>Snus räknare för en fattig student</h1>
</header>

<!-- Sida för counter -->
<main id="logg-page">
    <p>Tryck på knappen varje gång du tar en snus</p>
    <button id="btn">Sacka den</button>

    <p>Antal snus du har tagit idag:</p>
    <p id="prillor" class="counter">0</p>

    <div class="input-row">
        <input type="number" id="dosaInput" placeholder="Antal dosor">
        <input type="number" id="dosaPriceInput" placeholder="Pris/dosa">
    </div>
    <button id="dosaBtn">Köp dosa</button>

    <div class="input-row">
        <input type="number" id="stockInput" placeholder="Antal stock">
        <input type="number" id="stockPriceInput" placeholder="Pris/stock">
    </div>
    <button id="stockBtn">Köp stock</button>

    <button id="resetBtn">Nollställ data</button>
    <button id="showStatsBtn">Visa statistik</button>
</main>

<!-- Sida för statistik -->
<main id="stats-page" style="display:none;">
    <h2>Statistik</h2>
    <p>Antal snus idag: <span id="st-prillor">0</span></p>
    <p>Antal dosor denna veckan: <span id="st-dosor">0</span></p>
    <p>Antal stocks denna månaden: <span id="st-stocks">0</span></p>
    <p>Kostnad denna månaden: <span id="st-kostnad">0</span> kr</p>
    <button id="backToLoggBtn">Tillbaka till logg</button>
</main>

<footer>
    <p>&copy; Dj Jompi 2026</p>
</footer>
<img src="IMG_0760.jpg" alt="Bild på Theo" id="bg-img">
<script src="Script.js"></script>

<script>
  // Registrera service worker för PWA och offline-support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Snus_app/service-worker.js')
      .then(reg => console.log('✅ Service Worker registrerad'))
      .catch(err => console.log('Service Worker error:', err));
  }
</script>
</body>
</html>
