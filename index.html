<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Snus Counter</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <header>
        <h1>Snus räknare för en fattig student</h1>
    </header>

    <main>
        <p>Tryck på knappen varje gång du tar en snus</p>
        <button id="btn">Press Me</button>
        <p>Antal snus du har tagit idag</p>
        <p id="prillor">0</p>
        <p>Antal dosor denna veckan:</p>
        <p id="weekly-counter">0</p>
        <p>Antal stocks denna månaden:</p>
        <p id="monthly-counter">0</p>
        <button id="resetBtn">Reset Data</button>

    </main>

    <footer>
        <p>&copy; Dj Jompi 2026</p>
    </footer>

    <script src="Script.js"></script>
</body>
</html>
